version: '3.8'

services:

  # ── MySQL ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: certificaciones-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"          # comentar esta línea en producción
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - certnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Spring Boot ────────────────────────────────────
  backend:
    image: lagoriajoel/certificaciones-backend:latest
    container_name: certificaciones-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPERADOR_PASSWORD: ${OPERADOR_PASSWORD}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - certnet

  # ── Frontend Angular (Nginx) ───────────────────────────────
  frontend:
    image: lagoriajoel/certificaciones-frontend:latest
    container_name: certificaciones-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - certnet

volumes:
  mysql_data:
    driver: local

networks:
  certnet:
    driver: bridge