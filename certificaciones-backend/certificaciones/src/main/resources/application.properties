# ==========================================
# Aplicación
# ==========================================
spring.application.name=certificaciones-docentes

# ==========================================
# Base de datos - MySQL local (Workbench)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/certificaciones?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Datos de prueba (data.sql)
# ==========================================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ==========================================
# Servidor
# ==========================================
server.port=8080

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# Logging
# ==========================================
logging.level.com.escuela.certificaciones=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
