# ==========================================
# Aplicación
# ==========================================
spring.application.name=certificaciones-docentes

# ==========================================
# Base de datos — lee variables de entorno
# con fallback para desarrollo local
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:certificaciones}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ==========================================
# Datos iniciales (data.sql)
# ==========================================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ==========================================
# Servidor
# ==========================================
server.port=8080

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:7a4f2e8b1d6c3a9f5e2d8b4c7a1f3e6d9b2c5a8f1e4d7b3c6a9f2e5d8b1c4a7}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# Usuarios por defecto
# ==========================================
app.admin.password=${ADMIN_PASSWORD:admin}
app.operador.password=${OPERADOR_PASSWORD:admin}

# ==========================================
# Logging
# ==========================================
logging.level.com.escuela.certificaciones=${LOG_LEVEL:INFO}
