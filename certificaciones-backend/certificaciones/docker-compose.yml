version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: certificaciones-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: certificaciones
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - certificaciones-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uadmin", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certificaciones-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: certificaciones
      DB_USER: admin
      DB_PASSWORD: admin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - certificaciones-net

volumes:
  mysql_data:
    driver: local

networks:
  certificaciones-net:
    driver: bridge
